title: "おやじのAI投資ラボ"
description: "AIを活用した暗号資産自動売買Botの開発・運用記録 — 試行錯誤しながらコツコツ改良中"
baseurl: "/crypto-algo-lab-blog"
url: "https://mspj0123.github.io"
lang: ja

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

include:
  - _pages

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-include-cache

# 著者情報
author:
  name: "mspj0123"
  bio: "AIを使って暗号資産自動売買Botを開発・運用中のおやじ。失敗も含めてリアルな記録を発信しています。"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mspj0123"

# サイト全体のデフォルト設定
defaults:
  - scope:
      path: "_pages"
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
      toc: true
      toc_label: "目次"

# ナビゲーション（_data/navigation.yml で管理）

# スキン（カラーテーマ）: "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
minimal_mistakes_skin: "default"

# ページネーション
paginate: 10
paginate_path: "/page:num/"

# カテゴリ・タグページ
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - "*.py"
